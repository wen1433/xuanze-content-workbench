<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>《选择之间》内容工作台</title>
  <style>
    :root {
      --paper: #f4f0e8;
      --paper-soft: #faf8f2;
      --ink: #1f1c19;
      --muted: #6e675e;
      --line: #d5cec1;
      --line-dark: #8d8376;
      --coal: #2a2723;
      --white: #fffdf8;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--paper);
      color: var(--ink);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
      background:
        linear-gradient(rgba(31, 28, 25, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 28, 25, 0.03) 1px, transparent 1px),
        var(--paper);
      background-size: 42px 42px;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      width: min(1480px, calc(100vw - 40px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      margin: 0;
      font-size: clamp(24px, 3vw, 42px);
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .tagline {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      text-align: right;
    }

    .workspace {
      display: grid;
      grid-template-columns: 0.72fr 1.28fr;
      gap: 24px;
      padding: 26px 0 22px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.78);
    }

    .input-panel {
      position: sticky;
      top: 22px;
      padding: 24px;
    }

    .section-kicker {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.28em;
    }

    .section-title {
      margin: 0 0 18px;
      font-size: 24px;
      font-weight: 600;
    }

    .intro {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.9;
    }

    textarea {
      width: 100%;
      resize: vertical;
      border: 1px solid var(--line);
      background: var(--paper-soft);
      color: var(--ink);
      outline: none;
      line-height: 1.85;
      transition: border-color 160ms ease, background 160ms ease;
    }

    textarea:focus {
      border-color: var(--coal);
      background: var(--white);
    }

    #rawIdea {
      min-height: 260px;
      padding: 16px;
      font-size: 16px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      border: 1px solid var(--coal);
      background: var(--coal);
      color: var(--white);
      padding: 11px 16px;
      font-size: 14px;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .btn:hover {
      background: #4a443d;
    }

    .btn.secondary {
      background: transparent;
      color: var(--coal);
    }

    .btn.secondary:hover {
      background: var(--coal);
      color: var(--white);
    }

    .history {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .history-list {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .history-item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: transparent;
      padding: 10px 12px;
      color: var(--ink);
    }

    .history-item:hover {
      border-color: var(--coal);
      background: var(--paper-soft);
    }

    .history-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .result-panel {
      padding: 26px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .empty-state {
      min-height: 520px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line-dark);
      color: var(--muted);
      text-align: center;
      line-height: 1.9;
      padding: 24px;
    }

    .result-grid {
      display: grid;
      gap: 18px;
    }

    .result-block {
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .result-block:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .block-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.22em;
    }

    .block-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .block-heading .block-label {
      margin: 0;
    }

    .copy-item {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      padding: 5px 9px;
      font-size: 12px;
      line-height: 1.2;
      letter-spacing: 0.08em;
    }

    .copy-item:hover {
      border-color: var(--coal);
      color: var(--coal);
      background: var(--paper-soft);
    }

    .block-body {
      margin: 0;
      font-size: 16px;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    .big-title {
      font-size: clamp(26px, 4vw, 48px);
      line-height: 1.25;
      font-weight: 600;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .option-box {
      border: 1px solid var(--line);
      background: var(--paper-soft);
      padding: 16px;
    }

    .option-box strong {
      display: block;
      margin-bottom: 8px;
      color: var(--coal);
      letter-spacing: 0.18em;
    }

    ol,
    ul {
      margin: 0;
      padding-left: 1.4em;
      line-height: 1.9;
    }

    li + li {
      margin-top: 6px;
    }

    .storyboard {
      display: grid;
      gap: 12px;
    }

    .shot {
      border: 1px solid var(--line);
      background: var(--paper-soft);
      padding: 14px;
    }

    .shot h4 {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 600;
    }

    .shot p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .bottom-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      padding: 18px 0 4px;
      border-top: 1px solid var(--line);
    }

    .notice {
      min-height: 24px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .input-panel {
        position: static;
      }

      .two-col {
        grid-template-columns: 1fr;
      }

      .tagline {
        text-align: left;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100vw - 24px, 1480px);
        padding: 18px 0;
      }

      .topbar {
        display: block;
      }

      .tagline {
        margin-top: 8px;
      }

      .input-panel,
      .result-panel {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <h1 class="brand">《选择之间》内容工作台</h1>
      <p class="tagline">把一个粗粝的问题，整理成可发布、可分镜、可继续精修的内容素材。</p>
    </header>

    <section class="workspace">
      <aside class="panel input-panel">
        <p class="section-kicker">LOCAL DESK</p>
        <h2 class="section-title">原始想法</h2>
        <p class="intro">输入一个还没有成型的问题。它可以粗糙、矛盾、甚至只是一句话。工作台会用本地模板生成第一版素材，不上传任何内容。</p>
        <textarea id="rawIdea" placeholder="例如：如果一个人能删除痛苦记忆，他还算完整的自己吗？"></textarea>

        <div class="button-row">
          <button class="btn" id="generateBtn" type="button">生成内容素材</button>
          <button class="btn secondary" id="regenerateBtn" type="button">重新生成</button>
          <button class="btn secondary" id="saveBtn" type="button">保存草稿</button>
        </div>
        <p class="notice" id="notice"></p>

        <div class="history">
          <p class="section-kicker">DRAFTS</p>
          <h2 class="section-title">草稿历史</h2>
          <div class="history-list" id="historyList"></div>
        </div>
      </aside>

      <section class="panel result-panel">
        <div class="top-actions">
          <button class="btn secondary js-copy-markdown" type="button">一键复制 Markdown</button>
          <button class="btn secondary js-export-markdown" type="button">导出 .md 文件</button>
          <button class="btn secondary js-clear-current" type="button">清空当前内容</button>
        </div>
        <div id="resultRoot" class="empty-state">
          <div>
            <p class="section-kicker">OUTPUT</p>
            <p>生成后，命题、分镜、旁白与 Markdown 草稿会出现在这里。</p>
          </div>
        </div>
      </section>
    </section>

    <footer class="bottom-actions">
      <button class="btn secondary js-copy-markdown" type="button">一键复制 Markdown</button>
      <button class="btn secondary js-export-markdown" type="button">导出 .md 文件</button>
      <button class="btn secondary js-clear-current" type="button">清空当前内容</button>
    </footer>
  </main>

    function setDrafts(drafts) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(drafts.slice(0, 20)));
    }

    function pickFrom(items, index) {
      return items[index % items.length];
    }

    function rotate(items, offset) {
      return items.map((_, index) => items[(index + offset) % items.length]);
    }

    function pickRule(input) {
      const normalized = input.toLowerCase();
      const aiRule = conflictRules.find(rule => rule.id === "ai");
      if (aiRule && aiRule.keys.some(key => normalized.includes(key.toLowerCase()))) {
        return aiRule;
      }
      const intimateRule = conflictRules.find(rule => rule.label === "亲密关系");
      const intimatePriorityKeys = ["爱", "亲密", "背叛", "婚姻", "离开"];
      if (intimateRule && intimatePriorityKeys.some(key => normalized.includes(key.toLowerCase()))) {
        return intimateRule;
      }
      const growthRule = conflictRules.find(rule => rule.id === "growth");
      const growthPriorityKeys = ["努力", "成长", "未来", "适应规则", "更适应规则", "更自由", "成为自己", "成功", "上岸", "内卷", "规训", "驯化", "规则里", "考试", "工作", "前途", "改变命运"];
      if (growthRule && growthPriorityKeys.some(key => normalized.includes(key.toLowerCase()))) {
        return growthRule;
      }
      const freedomRule = conflictRules.find(rule => rule.label === "自由安全");
      const freedomPriorityKeys = ["安全", "保护", "被保护", "控制", "管理", "监控", "风险", "危险", "秩序", "规则限制", "牢笼", "选择权", "自主权"];
      if (freedomRule && freedomPriorityKeys.some(key => normalized.includes(key.toLowerCase()))) {
        return freedomRule;
      }
      return conflictRules.find(rule => rule.keys.some(key => normalized.includes(key.toLowerCase()))) || {
        keys: [],
        label: "通用",
        titleSeeds: ["你会怎么选择？", "选择的代价", "真实与更好生活", "更好的生活？", "留下什么自己？"],
        conflict: "真实自我与更好生活",
        aFrame: "选择改变，因为人不必永远被过去和惯性定义。",
        bFrame: "选择保留，因为真实的自我不能只按结果好坏来修剪。",
        motifs: ["安静书桌", "两条并行道路", "镜子", "晨光中的纸张", "空白便签", "半开的窗"],
        sharpQuestion: "如果更好的生活要求你改掉一部分自己，那还是你想要的生活吗？",
        reversal: "改变可能是在长大，也可能是在把不能被市场喜欢的部分慢慢删掉。"
      };
    }

    function cleanIdea(input) {
      return input.trim().replace(/\s+/g, " ");
    }

    function shortenTitle(title) {
      return title.length <= 24 ? title : `${title.slice(0, 23)}…`;
    }

    function textHash(text) {
      return Array.from(text).reduce((sum, char) => sum + char.charCodeAt(0), 0);
    }

    function titleRelevanceScore(title, idea) {
      const normalized = idea.toLowerCase();
      const markers = [
        "ai", "人工智能", "算法", "机器", "朋友", "真实", "关系", "理解", "陪伴",
        "死亡", "生命", "意义", "永生", "终点", "痛苦", "记忆", "删除", "遗忘",
        "爱", "爱情", "亲密", "自由", "边界", "占有", "救", "陌生人", "亲近",
        "道德", "善良", "安全", "保护", "控制", "危险", "规则", "秩序",
        "成长", "努力", "未来", "舒服", "大学"
      ];
      return markers.reduce((score, marker) => {
        const lowerMarker = marker.toLowerCase();
        return normalized.includes(lowerMarker) && title.toLowerCase().includes(lowerMarker) ? score + 1 : score;
      }, 0);
    }

    function makeQuestionTitle(idea, rule, variant = 0) {
      if (rule?.titleSeeds?.length) {
        const seeds = [...new Set(rule.titleSeeds.map(shortenTitle))];
        const scored = seeds.map(title => ({
          title,
          score: titleRelevanceScore(title, idea)
        }));
        const matched = scored
          .filter(item => item.score > 0)
          .sort((a, b) => b.score - a.score)
          .map(item => item.title);
        if (matched.length > 0) {
          const candidates = [...matched, ...seeds.filter(title => !matched.includes(title))];
          return pickFrom(candidates, variant);
        }
        return pickFrom(seeds, textHash(idea) + variant);
      }

      const text = cleanIdea(idea).replace(/[。！？!?]$/g, "");
      if (text.includes("还是")) return shortenTitle(text.split("还是")[0] + "，还是？");
      if (text.includes("是否")) return shortenTitle(text.slice(text.indexOf("是否"), text.indexOf("是否") + 12) + "？");
      return "选择的代价";
    }

    function generateContent(rawIdea, variant = 0) {
      const idea = cleanIdea(rawIdea);
      const rule = pickRule(idea);
      const title = makeQuestionTitle(idea, rule, variant);
      const motifs = rotate(rule.motifs, variant);
      const body = rule.body || `当这个问题落到一个具体的人身上，它不再只是抽象判断。它要求我们在两个都不轻松的方向之间做出选择：一边试图给生活减轻重量，另一边坚持某些东西不能轻易交出去。真正被拉开的，是${rule.conflict}。`;
      const optionA = rule.aFrame;
      const optionB = rule.bFrame;
      const reasonLimit = rule.reasonLimit || (rule.id === "ai" ? 4 : 3);

      const aReasons = rotate(rule.aReasons || [
        `A 方会认为，${rule.aFrame.replace(/。$/, "")}这不是软弱，而是承认人的承受力有边界。`,
        "人的生活不是用来证明某种纯粹性的，如果一种选择能让人少受伤，它就值得被认真考虑。",
        "真实并不总是天然高于幸福，很多时候，人需要先活下来，才有余力谈完整。",
        "改变经验或选择结果，并不一定意味着逃避，也可能是一种主动整理人生的方式。"
      ], variant).slice(0, reasonLimit);

      const bReasons = rotate(rule.bReasons || [
        `B 方会坚持，${rule.bFrame.replace(/。$/, "")}有些代价不是立刻显现，却会慢慢改变一个人。`,
        "如果为了更好生活而不断修剪自己，最后留下的也许只是一个更顺滑、更陌生的人。",
        "痛苦、迟疑和失败并不只是负担，它们也构成了人理解自己的证据。",
        "一旦把真实交给结果评估，人就很容易把难以承受的部分都判定为无用。"
      ], variant).slice(0, reasonLimit);

      const questions = rotate(rule.questions || [
        "如果一个选择能让人过得更好，它是否仍然需要接受真实性的审问？",
        "我们是在保护自我，还是在保护某种不愿改变的惯性？",
        "当两种选择都可能伤害人时，判断的边界应该由谁来划定？",
        `在${rule.conflict}之间，哪一方更接近你不愿失去的东西？`
      ], variant).slice(0, 3);

      const script = rule.script || [
        `0-5 秒：${rule.sharpQuestion}`,
        `5-12 秒：A 方的诱惑是，它让人立刻少背一点重量：${rule.aFrame}`,
        `12-20 秒：B 方的代价是，它要求你继续面对那些不舒服的部分：${rule.bFrame}`,
        `20-26 秒：${rule.reversal}`,
        `26-30 秒：如果必须失去一部分东西才能继续生活，你最不愿交出去的是什么？`
      ];

      const shots = rule.shots ? rotate(rule.shots, variant).slice(0, 6) : [
        {
          title: "分镜 1：问题出现",
          image: `米白色纸面上写着问题，桌面安静，光线克制，画面母题：${pickFrom(motifs, 0)}`,
          voice: `如果这个问题真的落到你身上，你会立刻知道它并不轻。`
        },
        {
          title: "分镜 2：A 选项",
          image: `一个人站在柔和光线里，画面留白多，象征减轻负担，画面母题：${pickFrom(motifs, 1)}`,
          voice: `A 方相信，人有权选择一种更能生活下去的方式。`
        },
        {
          title: "分镜 3：B 选项",
          image: `人物保持沉默，冷静深灰色调，空间里有轻微错位感，画面母题：${pickFrom(motifs, 2)}`,
          voice: `B 方担心，当痛苦被拿走，自我也被悄悄改写。`
        },
        {
          title: "分镜 4：冲突拉开",
          image: `画面一分为二，一侧明亮，一侧阴影，中央有细窄裂缝，画面母题：${pickFrom(motifs, 3)}`,
          voice: `这不是简单的支持或反对，而是两种价值在互相拉扯。`
        },
        {
          title: "分镜 5：追问",
          image: `近景，一只手停在按钮或纸页上，没有按下，空气安静，画面母题：${pickFrom(motifs, 4)}`,
          voice: `如果更好的结果需要牺牲某部分真实，你愿意付出多少？`
        },
        {
          title: "分镜 6：留白结尾",
          image: `空桌、未写完的句子、远处微弱光线，极简构图，画面母题：${pickFrom(motifs, 5)}`,
          voice: `选择没有替你完成，它只是把你带回自己面前。`
        }
      ];

      const narration = rule.narration || [
        `有些问题之所以难，不是因为我们不知道答案，而是因为每个答案都会拿走一点东西。`,
        `选择 A，像是在承认人需要被保护：${rule.aFrame}`,
        `选择 B，像是在坚持人不能被轻易重写：${rule.bFrame}`,
        `这道题真正问的也许不是你支持哪边，而是你认为一个人最不能失去的东西是什么。`
      ].join("\n");

      return {
        rawIdea: idea,
        topicLabel: rule.label,
        title,
        body,
        optionA,
        optionB,
        conflict: rule.conflict,
        aReasons,
        bReasons,
        questions,
        script,
        shots,
        narration,
        xiaohongshuTitles: rule.xiaohongshuTitles || [
          `如果是你，会怎么选：${title}`,
          `一个很安静但很难的问题：${rule.conflict}`,
          `成年人最难的选择，往往不是对错`
        ],
        bilibiliTitles: rule.bilibiliTitles || [
          `【选择之间】${title}`,
          `当${rule.conflict}发生冲突，我们到底该选什么？`,
          `一个30秒讲不完的问题：${title}`
        ],
        createdAt: new Date().toISOString()
      };
    }

    function listToHtml(items) {
      return `<ol>${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ol>`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function blockHeading(label, copyKey) {
      const button = copyKey ? `<button class="copy-item" type="button" data-copy="${copyKey}">复制</button>` : "";
      return `<div class="block-heading"><p class="block-label">${label}</p>${button}</div>`;
    }

    function renderOutput(output) {
      if (!output) {
        dom.resultRoot.className = "empty-state";
        dom.resultRoot.innerHTML = `
          <div>
            <p class="section-kicker">OUTPUT</p>
            <p>生成后，命题、分镜、旁白与 Markdown 草稿会出现在这里。</p>
          </div>
        `;
        return;
      }

      dom.resultRoot.className = "result-grid";
      dom.resultRoot.innerHTML = `
        <section class="result-block">
          ${blockHeading("今日命题标题", "title")}
          <h2 class="block-body big-title">${escapeHtml(output.title)}</h2>
        </section>
        <section class="result-block">
          <p class="block-label">识别主题</p>
          <p class="block-body">${escapeHtml(output.topicLabel || "通用")}</p>
        </section>
        <section class="result-block">
          ${blockHeading("命题正文", "body")}
          <p class="block-body">${escapeHtml(output.body)}</p>
        </section>
        <section class="result-block two-col">
          <div class="option-box">${blockHeading("A", "options")}<p class="block-body">${escapeHtml(output.optionA)}</p></div>
          <div class="option-box">${blockHeading("B", "options")}<p class="block-body">${escapeHtml(output.optionB)}</p></div>
        </section>
        <section class="result-block">
          <p class="block-label">核心价值冲突</p>
          <p class="block-body">${escapeHtml(output.conflict)}</p>
        </section>
        <section class="result-block two-col">
          <div>
            <p class="block-label">A 方可能理由</p>
            ${listToHtml(output.aReasons)}
          </div>
          <div>
            <p class="block-label">B 方可能理由</p>
            ${listToHtml(output.bReasons)}
          </div>
        </section>
        <section class="result-block">
          <p class="block-label">3 个延伸追问</p>
          ${listToHtml(output.questions)}
        </section>
        <section class="result-block">
          ${blockHeading("30 秒短视频脚本", "script")}
          ${listToHtml(output.script)}
        </section>
        <section class="result-block">
          ${blockHeading("6 个分镜与画面提示词", "shots")}
          <div class="storyboard">
            ${output.shots.map(shot => `
              <article class="shot">
                <h4>${escapeHtml(shot.title)}</h4>
                <p><strong>画面：</strong>${escapeHtml(shot.image)}</p>
                <p><strong>旁白：</strong>${escapeHtml(shot.voice)}</p>
              </article>
            `).join("")}
          </div>
        </section>
        <section class="result-block">
          ${blockHeading("旁白文案", "narration")}
          <p class="block-body">${escapeHtml(output.narration)}</p>
        </section>
        <section class="result-block">
          ${blockHeading("发布标题", "publishTitles")}
          <div class="two-col">
            <div>
              <p class="block-label">小红书标题</p>
              ${listToHtml(output.xiaohongshuTitles)}
            </div>
            <div>
              <p class="block-label">B站标题</p>
              ${listToHtml(output.bilibiliTitles)}
            </div>
          </div>
        </section>
      `;
    }

    function toMarkdown(output) {
      if (!output) return "";

      return `# ${output.title}

识别主题：${output.topicLabel || "通用"}

## 命题正文

${output.body}

## A / B 选项

A：${output.optionA}

B：${output.optionB}

## 核心价值冲突

${output.conflict}

## A 方可能理由

${output.aReasons.map((item, index) => `${index + 1}. ${item}`).join("\n")}

## B 方可能理由

${output.bReasons.map((item, index) => `${index + 1}. ${item}`).join("\n")}

## 延伸追问

${output.questions.map((item, index) => `${index + 1}. ${item}`).join("\n")}

## 30 秒短视频脚本

${output.script.map((item, index) => `${index + 1}. ${item}`).join("\n")}

## 6 个分镜

${output.shots.map((shot, index) => `${index + 1}. ${shot.title}
   - 画面：${shot.image}
   - 旁白：${shot.voice}`).join("\n\n")}

## 画面提示词

${output.shots.map((shot, index) => `${index + 1}. ${shot.image}`).join("\n")}

## 旁白文案

${output.narration}

## 发布标题

### 小红书

${output.xiaohongshuTitles.map((item, index) => `${index + 1}. ${item}`).join("\n")}

### B站

${output.bilibiliTitles.map((item, index) => `${index + 1}. ${item}`).join("\n")}
`;
    }

    function sectionText(key, output) {
      if (!output) return "";
      const sections = {
        title: output.title,
        body: output.body,
        options: `A：${output.optionA}\n\nB：${output.optionB}`,
        script: output.script.join("\n"),
        shots: output.shots.map((shot, index) => `${index + 1}. ${shot.title}\n画面：${shot.image}\n旁白：${shot.voice}`).join("\n\n"),
        narration: output.narration,
        publishTitles: `小红书：\n${output.xiaohongshuTitles.map((item, index) => `${index + 1}. ${item}`).join("\n")}\n\nB站：\n${output.bilibiliTitles.map((item, index) => `${index + 1}. ${item}`).join("\n")}`
      };
      return sections[key] || "";
    }

    async function copyText(text, successMessage) {
      if (!text) {
        setNotice("请先生成内容素材。");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const helper = document.createElement("textarea");
        helper.value = text;
        document.body.appendChild(helper);
        helper.select();
        document.execCommand("copy");
        helper.remove();
      }
      setNotice(successMessage);
    }

    function saveCurrentDraft() {
      const rawIdea = dom.rawIdea.value.trim();
      if (!rawIdea) {
        setNotice("先写下一个原始想法，再保存草稿。");
        return;
      }

      if (!state.output || state.output.rawIdea !== cleanIdea(rawIdea)) {
        state.variant = 0;
        state.output = generateContent(rawIdea, state.variant);
        renderOutput(state.output);
      }

      const drafts = getDrafts();
      const draft = {
        id: String(Date.now()),
        rawIdea: cleanIdea(rawIdea),
        output: state.output,
        variant: state.variant,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      setDrafts([draft, ...drafts.filter(item => item.rawIdea !== draft.rawIdea)]);
      localStorage.setItem(LAST_KEY, JSON.stringify(draft));
      renderHistory();
      setNotice("草稿已保存到本地浏览器。");
    }

    function renderHistory() {
      const drafts = getDrafts();
      if (drafts.length === 0) {
        dom.historyList.innerHTML = `<p class="intro">还没有保存的草稿。</p>`;
        return;
      }

      dom.historyList.innerHTML = drafts.map(draft => `
        <button class="history-item" type="button" data-id="${draft.id}">
          <strong>${escapeHtml(draft.output?.title || draft.rawIdea)}</strong>
          <span>${new Date(draft.updatedAt || draft.createdAt).toLocaleString("zh-CN")}</span>
        </button>
      `).join("");

      dom.historyList.querySelectorAll(".history-item").forEach(button => {
        button.addEventListener("click", () => {
          const draft = getDrafts().find(item => item.id === button.dataset.id);
          if (!draft) return;
          dom.rawIdea.value = draft.rawIdea;
          state.rawIdea = draft.rawIdea;
          state.output = draft.output;
          state.variant = draft.variant || 0;
          renderOutput(state.output);
          setNotice("已恢复草稿。");
        });
      });
    }

    function downloadMarkdown() {
      if (!state.output) {
        setNotice("请先生成内容素材。");
        return;
      }

      const blob = new Blob([toMarkdown(state.output)], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      const safeName = state.output.title.replace(/[\\/:*?"<>|]/g, "").slice(0, 36) || "选择之间内容素材";
      anchor.href = url;
      anchor.download = `${safeName}.md`;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      setNotice("Markdown 文件已导出。");
    }

    async function copyMarkdown() {
      if (!state.output) {
        setNotice("请先生成内容素材。");
        return;
      }

      await copyText(toMarkdown(state.output), "Markdown 已复制。");
    }

    function clearCurrent() {
      dom.rawIdea.value = "";
      state.rawIdea = "";
      state.output = null;
      state.variant = 0;
      localStorage.removeItem(LAST_KEY);
      localStorage.removeItem("xuanze_content_workbench_input");
      renderOutput(null);
      setNotice("当前内容已清空，本地历史草稿仍保留。");
    }

    function restoreLast() {
      try {
        const last = JSON.parse(localStorage.getItem(LAST_KEY) || "null");
        if (!last) return;
        dom.rawIdea.value = last.rawIdea || "";
        state.rawIdea = last.rawIdea || "";
        state.output = last.output || null;
        state.variant = last.variant || 0;
        renderOutput(state.output);
      } catch {
        localStorage.removeItem(LAST_KEY);
      }
    }

    function generateFromInput({ regenerate = false } = {}) {
      const rawIdea = dom.rawIdea.value.trim();
      if (!rawIdea) {
        setNotice("请先输入一个原始想法。");
        return;
      }

      state.rawIdea = cleanIdea(rawIdea);
      state.variant = regenerate ? state.variant + 1 : 0;
      state.output = generateContent(state.rawIdea, state.variant);
      localStorage.setItem(LAST_KEY, JSON.stringify({
        id: "last",
        rawIdea: state.rawIdea,
        output: state.output,
        variant: state.variant,
        updatedAt: new Date().toISOString()
      }));
      renderOutput(state.output);
      setNotice(regenerate ? "已基于当前输入重新生成一套素材。" : "内容素材已生成。你可以继续复制、导出或保存草稿。");
    }

    dom.generateBtn.addEventListener("click", () => generateFromInput());
    dom.regenerateBtn.addEventListener("click", () => generateFromInput({ regenerate: true }));

    dom.saveBtn.addEventListener("click", saveCurrentDraft);

    document.querySelectorAll(".js-copy-markdown").forEach(button => {
      button.addEventListener("click", copyMarkdown);
    });
    document.querySelectorAll(".js-export-markdown").forEach(button => {
      button.addEventListener("click", downloadMarkdown);
    });
    document.querySelectorAll(".js-clear-current").forEach(button => {
      button.addEventListener("click", clearCurrent);
    });

    dom.resultRoot.addEventListener("click", event => {
      const button = event.target.closest("[data-copy]");
      if (!button) return;
      copyText(sectionText(button.dataset.copy, state.output), "这一项已复制。");
    });

    dom.rawIdea.addEventListener("input", () => {
      localStorage.setItem("xuanze_content_workbench_input", dom.rawIdea.value);
    });

    const savedInput = localStorage.getItem("xuanze_content_workbench_input");
    if (savedInput) dom.rawIdea.value = savedInput;
    restoreLast();
    renderHistory();
  </script>
